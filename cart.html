<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-wrapper">

  <nav class="navbar">
    <a href="index.html" class="nav-logo">Market<span>49</span></a>
    <div class="nav-search">
      <input type="text" placeholder="Search Listings..." id="searchInput" aria-label="Search listings" autocomplete="off" />
      <div class="search-suggestions" id="searchSuggestions"></div>
    </div>
    <div class="nav-right">
  <a href="cart.html" class="nav-cart">🛒<span class="cart-badge">0</span></a>
  <a href="signin.html" class="nav-signin" id="navAuthLink">Sign In</a>
</div>
    <button class="toggle-pill" id="darkToggle" type="button" aria-label="Switch to dark mode">
      <span class="knob"></span>
    </button>
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
  <a href="index.html">🏠 Home</a>
  <a href="listings.html">🔍 Browse Listings</a>
  <a href="post-listings.html">📦 Post a Listing</a>
  <a href="signin.html">👤 Sign In</a>
  <a href="cart.html">🛒 Cart</a>
</div>
  <main class="cart-main">
    <h1 class="h2" style="margin-bottom: 1.5rem;">Your Cart</h1>

    <div id="cartList" class="cart-list"></div>

    <div id="cartEmpty" class="cart-empty" style="display:none;">
      <p>Your cart is empty.</p>
      <a href="listings.html" class="btn btn-primary">Browse Listings</a>
    </div>

    <div id="cartSummary" class="cart-summary" style="display:none;">
      <div class="summary-row"><span>Subtotal</span><span id="cartSubtotal">$0.00</span></div>
      <div class="summary-row"><span>Shipping</span><span>Free</span></div>
      <div class="summary-row total"><span>Total</span><span id="cartTotalAmount">$0.00</span></div>
      <a href="checkout.html" class="btn btn-primary btn-full" style="margin-top: 1rem;">Checkout</a>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="#">Help Center</a>
      <a href="contact.html">Contact</a>
      <a href="#">Terms</a>
      <a href="#">Privacy</a>
    </div>
    <p>© 2026 Market49</p>
  </footer>

  <div class="spinner-overlay" id="spinnerOverlay">
    <div class="spinner"></div>
  </div>

  <script src="js/script.js"></script>

</html>
