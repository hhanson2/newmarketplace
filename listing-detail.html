<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market49 — Listing Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-wrapper">

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">Market<span>49</span></a>
    <div class="nav-search">
      <input type="text" placeholder="Search Listings..." id="searchInput" aria-label="Search listings" autocomplete="off" />
      <div class="search-suggestions" id="searchSuggestions"></div>
    </div>
    <div class="nav-right">
  <a href="cart.html" class="nav-cart">🛒<span class="cart-badge">0</span></a>
  <a href="signin.html" class="nav-signin" id="navAuthLink">Sign In</a>
</div>
    <button class="toggle-pill" id="darkToggle" type="button" aria-label="Switch to dark mode">
  <span class="knob"></span>
</button>
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
  <a href="index.html">🏠 Home</a>
  <a href="listings.html">🔍 Browse Listings</a>
  <a href="post-listings.html">📦 Post a Listing</a>
  <a href="signin.html">👤 Sign In</a>
  <a href="cart.html">🛒 Cart</a>
</div>

  <!-- LISTING DETAIL -->
<main style="flex:1;">
  <div class="listing-layout">

    <!-- Image -->
    <div class="listing-img">
      <img src="" alt="" />
    </div>

    <!-- Info -->
    <div class="listing-info">
      <p class="listing-title">Loading...</p>
      <p class="listing-price"></p>
      <p class="listing-desc"></p>
      <div class="listing-actions">
  <div class="input-group">
    <label>Quantity</label>
    <div class="qty-stepper" id="detailQty">
      <button type="button" data-action="dec" aria-label="Decrease">−</button>
      <input type="number" value="1" min="1" max="10" aria-label="Quantity" />
      <button type="button" data-action="inc" aria-label="Increase">+</button>
    </div>
  </div>
  <button id="addToCartBtn" class="btn btn-secondary btn-full">Add to Cart</button>
  <a href="checkout.html" class="btn btn-primary btn-full">Buy Now</a>
  <button id="messageSellerBtn" class="btn btn-secondary btn-full">Message Seller</button>

<form id="messageForm" class="auth-form" hidden style="margin-top: 1rem;">
  <div class="input-group">
    <label for="messageText">Your message</label>
    <textarea id="messageText" class="input-field" rows="4" required placeholder="Hi, is this still available?"></textarea>
  </div>
  <div style="display: flex; gap: 0.5rem;">
    <button type="button" id="messageCancel" class="btn btn-secondary" style="flex: 1;">Cancel</button>
    <button type="submit" class="btn btn-primary" style="flex: 1;">Send</button>
  </div>
</form>

<p id="messageSent" hidden style="color: var(--success); text-align: center; margin-top: 1rem;">
  ✓ Message sent!
</p>

</div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-links">
      <a href="#">Help Center</a>
      <a href="contact.html">Contact</a>
      <a href="#">Terms</a>
      <a href="#">Privacy</a>
    </div>
    <p>© 2026 Market49</p>
  </footer>

  <!-- SPINNER -->
  <div class="spinner-overlay" id="spinnerOverlay">
    <div class="spinner"></div>
  </div>

  <script src="js/script.js"></script>
 <script>
  // load the right listing based on URL
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (id) {
  const all = JSON.parse(localStorage.getItem('market49-listings') || '[]');
  const item = all.find(l => l.id === id);

  if (item) {
    document.querySelector('.listing-img img').src = item.image || `https://placehold.co/600x450/e0e0e0/666?text=${encodeURIComponent(item.name)}`;
    document.querySelector('.listing-title').textContent = item.name;
    document.querySelector('.listing-price').textContent = item.price;
    document.querySelector('.listing-desc').textContent = item.description || 'No description provided.';
    document.title = `${item.name} — Market49`;
  } else {
    document.querySelector('.listing-title').textContent = 'Listing not found';
    document.querySelector('.listing-desc').textContent = 'This listing may have been removed.';
  }
} else {
  document.querySelector('.listing-title').textContent = 'No listing selected';
  document.querySelector('.listing-desc').textContent = 'Browse listings to view details.';
}

  // Buy Now spinner
  document.querySelector('.btn-primary').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('spinnerOverlay').classList.add('visible');
    setTimeout(() => {
      window.location.href = 'checkout.html';
    }, 800);
  });


  
  // Message Seller form
const messageBtn = document.getElementById('messageSellerBtn');
const messageForm = document.getElementById('messageForm');
const messageSent = document.getElementById('messageSent');

messageBtn.addEventListener('click', () => {
  messageForm.hidden = false;
  messageBtn.hidden = true;
  document.getElementById('messageText').focus();
});

messageForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = document.getElementById('messageText').value.trim();
  if (!text) return;

  messageForm.hidden = true;
  messageSent.hidden = false;
});


document.getElementById('messageCancel').addEventListener('click', () => {
  messageForm.hidden = true;
  messageBtn.hidden = false;
  document.getElementById('messageText').value = '';
});
</script>



</body>
</html>
